<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0b0e12" stroke="url(#g1)" stroke-width="2"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#g2)" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Outer ring segments -->
  <g opacity="0.15">
    <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="0.3" stroke-dasharray="8 24"/>
  </g>
  
  <!-- Core orb - arc reactor style -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#g1)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="65" fill="none" stroke="url(#g2)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Voice wave arcs - left side -->
  <g filter="url(#glow)">
    <path d="M160 240 Q140 256 160 272" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M140 220 Q115 256 140 292" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M120 200 Q90 256 120 312" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Voice wave arcs - right side -->
  <g filter="url(#glow)">
    <path d="M352 240 Q372 256 352 272" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
    <path d="M372 220 Q397 256 372 292" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M392 200 Q422 256 392 312" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Connection node (center) -->
  <circle cx="256" cy="256" r="12" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="6" fill="#fff" opacity="0.9"/>
  
  <!-- Connection lines to voice arcs -->
  <line x1="256" y1="256" x2="160" y2="256" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="256" x2="352" y2="256" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  
  <!-- Orbital dots -->
  <circle cx="256" cy="106" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="256" cy="406" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="106" cy="256" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="406" cy="256" r="3" fill="#7c3aed" opacity="0.4"/>
  
  <!-- Letter S subtle mark -->
  <text x="256" y="272" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="72" font-weight="700" fill="url(#g1)" filter="url(#glow)" opacity="0.15">S</text>
</svg>
